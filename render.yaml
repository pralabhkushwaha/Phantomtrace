services:
  - type: web
    name: phantomtrace-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./phantomtrace.db
      # Optional: add your API keys here for enhanced reputation checks
      # - key: VIRUSTOTAL_API_KEY
      #   value: your_vt_key_here
      # - key: ABUSEIPDB_API_KEY
      #   value: your_abuseipdb_key_here
